name: Update News Ticker

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xml2js

      - name: Fetch and update news
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');
          const xml2js = require('xml2js');

          const NEWS_SOURCES = [
            { name: 'CNN', url: 'https://feeds.cnn.com/rss/edition.rss' },
            { name: 'Fox News', url: 'https://feeds.foxnews.com/foxnews/latest' },
            { name: 'NY Times', url: 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml' },
            { name: 'NY1', url: 'https://www.ny1.com/rss/news' }
          ];

          const GORY_KEYWORDS = ['death', 'killed', 'murder', 'attack', 'violence', 'accident', 'crash', 'fatal', 'injured'];
          const OUTPUT_FILE = 'news.txt';

          const parser = new xml2js.Parser();

          function isGoryHeadline(title) {
            const lowerTitle = title.toLowerCase();
            return GORY_KEYWORDS.some(keyword => lowerTitle.includes(keyword));
          }

          async function fetchNews(source) {
            return new Promise((resolve, reject) => {
              https.get(source.url, (res) => {
                let data = '';
                res.on('data', (chunk) => {
                  data += chunk;
                });
                res.on('end', async () => {
                  try {
                    const parsed = await parser.parseStringPromise(data);
                    const items = parsed.rss.channel[0].item || [];
                    
                    const headlines = [];
                    for (const item of items) {
                      if (headlines.length >= 3) break;
                      
                      const title = item.title[0] || 'No Title';
                      
                      if (!isGoryHeadline(title)) {
                        headlines.push(`${source.name}: ${title}`);
                      }
                    }

                    resolve(headlines);
                  } catch (error) {
                    console.error(`Error parsing ${source.name}:`, error.message);
                    resolve([]); // Return empty array on error, don't fail
                  }
                });
              }).on('error', (error) => {
                console.error(`Error fetching ${source.name}:`, error.message);
                resolve([]); // Return empty array on error, don't fail
              });
            });
          }

          async function updateNewsFile() {
            try {
              console.log('Fetching news from all sources...');
              const allHeadlines = [];

              for (const source of NEWS_SOURCES) {
                const headlines = await fetchNews(source);
                allHeadlines.push(...headlines);
                console.log(`${source.name}: ${headlines.length} headlines fetched`);
              }

              const newsContent = allHeadlines.join('\n');
              fs.writeFileSync(OUTPUT_FILE, newsContent);
              console.log(`✓ News updated at ${new Date().toISOString()}`);
              console.log(`✓ Total headlines: ${allHeadlines.length}`);
            } catch (error) {
              console.error('Error updating news:', error);
              process.exit(1);
            }
          }

          updateNewsFile();
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add news.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update news ticker with headlines from CNN, Fox News, NY Times, and NY1"
            git push
          fi
